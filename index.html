<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thinksharp — Learning for Every Student</title>
  <style>
    /* ---- Basic reset ---- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background-color: #FFFDF5;
      color: #1A1A1A;
    }

    /* ---- Header ---- */
    header {
      background-color: #FFFFFF;
      border-bottom: 4px solid #F4D93E;
      padding: 14px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand img.logo {
      height: 50px;
    }

    .brand .wordmark {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #1A1A1A;
      font-family: Arial, Helvetica, sans-serif;
      text-transform: uppercase;
    }

    header nav a {
      margin-left: 24px;
      text-decoration: none;
      color: #1A1A1A;
      font-weight: 600;
      font-size: 14px;
    }

    /* ---- Hero section ---- */
    .hero {
      text-align: center;
      padding: 70px 20px 90px;
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 16px;
      color: #1A1A1A;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .hero h2 span {
      color: #2BA6A4;
    }

    .hero p {
      font-size: 18px;
      color: #555;
      max-width: 520px;
      margin: 0 auto 30px auto;
    }

    /* ---- Sign-up form ---- */
    .signup-box {
      background: white;
      max-width: 440px;
      margin: 0 auto;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      text-align: left;
      border-top: 5px solid #F4D93E;
    }

    .signup-box h3 {
      margin-bottom: 4px;
      color: #1A1A1A;
      text-align: center;
      font-size: 20px;
    }

    .signup-box .subtext {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    .hint {
      font-size: 12px;
      color: #999;
      font-weight: 400;
      margin-left: 4px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #DDD;
      border-radius: 8px;
      font-size: 14px;
      background: #FAFAFA;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #2BA6A4;
      background: white;
    }

    /* Checkbox group for exams */
    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      background: #FAFAFA;
      border: 1px solid #DDD;
      border-radius: 8px;
      padding: 8px 10px;
    }

    .checkbox-item input {
      margin-right: 8px;
    }

    .checkbox-item label {
      margin: 0;
      font-weight: 500;
      font-size: 13px;
    }

    #otherLanguageBox {
      display: none;
      margin-top: 10px;
    }

    button {
      width: 100%;
      margin-top: 26px;
      padding: 13px;
      background-color: #2BA6A4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    button:hover {
      background-color: #228785;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: #888;
      font-size: 13px;
      background: #FFF9E0;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <img src="bulb-icon.png" alt="Thinksharp bulb icon" class="logo">
      <span class="wordmark">Thinksharp</span>
    </div>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Learning, in your language. <br>For <span>every</span> student.</h2>
    <p>Thinksharp brings free, organized video lessons to students everywhere — matched to your board, subject, and language.</p>

    <div class="signup-box">
      <h3>Create your student profile</h3>
      <p class="subtext">Takes less than a minute</p>

      <form id="signupForm">
        <label for="name">Your name</label>
        <input type="text" id="name" placeholder="e.g. Arjun Sharma" required>

        <label for="country">Country</label>
        <input type="text" id="country" placeholder="e.g. India" required>

        <label for="board">School board</label>
        <select id="board" required>
          <option value="">Select your board</option>
          <option value="CBSE">CBSE</option>
          <option value="ICSE">ICSE</option>
          <option value="NCERT">NCERT</option>
          <option value="State Board">State Board</option>
          <option value="IGCSE-O">IGCSE O Level</option>
          <option value="IGCSE-A">IGCSE A Level / A Level</option>
          <option value="US-AP">US (AP / Common Core)</option>
          <option value="Other">Other</option>
        </select>

        <label>Competitive exams you're preparing for <span class="hint">(select all that apply)</span></label>
        <div class="checkbox-grid">
          <div class="checkbox-item">
            <input type="checkbox" id="exam-jee" value="JEE">
            <label for="exam-jee">JEE</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="exam-neet" value="NEET">
            <label for="exam-neet">NEET</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="exam-sat" value="SAT">
            <label for="exam-sat">SAT</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="exam-other" value="Other">
            <label for="exam-other">Other / None</label>
          </div>
        </div>

        <label for="language">Preferred language</label>
        <select id="language" required>
          <option value="">Select a language</option>
          <option value="English">English</option>
          <option value="Hindi">Hindi</option>
          <option value="Tamil">Tamil</option>
          <option value="Telugu">Telugu</option>
          <option value="Kannada">Kannada</option>
          <option value="Malayalam">Malayalam</option>
          <option value="Marathi">Marathi</option>
          <option value="Bengali">Bengali</option>
          <option value="Gujarati">Gujarati</option>
          <option value="Punjabi">Punjabi</option>
          <option value="Urdu">Urdu</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="Arabic">Arabic</option>
          <option value="Mandarin Chinese">Mandarin Chinese</option>
          <option value="Portuguese">Portuguese</option>
          <option value="Swahili">Swahili</option>
          <option value="Other">Other (type below)</option>
        </select>

        <div id="otherLanguageBox">
          <input type="text" id="otherLanguage" placeholder="Type your language">
        </div>

        <button type="submit">Get Started</button>
      </form>
    </div>
  </section>

  <footer>
    &copy; 2026 Thinksharp. Growing daily, always.
  </footer>

  <script>
    // Show/hide the "type your language" box
    document.getElementById('language').addEventListener('change', function() {
      const box = document.getElementById('otherLanguageBox');
      box.style.display = (this.value === 'Other') ? 'block' : 'none';
    });

    // Handle form submission
    document.getElementById('signupForm').addEventListener('submit', function(event) {
      event.preventDefault(); // stops the page from reloading

      const name = document.getElementById('name').value;
      const board = document.getElementById('board').value;

      let language = document.getElementById('language').value;
      if (language === 'Other') {
        language = document.getElementById('otherLanguage').value || 'Other';
      }

      // Collect checked exam checkboxes
      const examBoxes = document.querySelectorAll('.checkbox-item input[type="checkbox"]:checked');
      const exams = Array.from(examBoxes).map(box => box.value);
      const examText = exams.length > 0 ? exams.join(', ') : 'None selected';

      alert("Welcome to Thinksharp, " + name + "!\nBoard: " + board + "\nExams: " + examText + "\nLanguage: " + language);
    });
  </script>

</body>
</html>
